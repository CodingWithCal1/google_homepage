<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Homepage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-section">
        <div class="left-side">
        <a href="https://about.google/">About</a>
        <a href="https://store.google.com">Store</a>
        </div>

        <div class="right-side">
        <a href="https://gmail.com">Gmail</a>
        <a href="https://images.google.com">Images</a>
        <img class="app-icon" src="https://cdn3.iconfinder.com/data/icons/feather-5/24/more-vertical-512.png">
        <img class="profile-pic" src="https://i.pinimg.com/1200x/b9/c4/7e/b9c47ef70bff06613d397abfce02c6e7.jpg">
        </div>
    </div>
    <div class="middle-section">
        <img class="google-logo" 
src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png"
/>
        <form class="search-form">
            <div class="search-form-input">
    <img class="search-icon" 
    src="https://cdn-icons-png.flaticon.com/512/3031/3031293.png"
    />
    <label for="search">Search</label>
    <input type="text" name="search" id="search">
    <img class="mic" 
    src="https://www.iconpacks.net/icons/1/free-microphone-icon-342-thumb.png"
    />
    <img class="camera" 
    src="https://cdn-icons-png.flaticon.com/512/883/883746.png"
    />
</div>

<div class="search-form-buttons">
    <button type="submit">Search</button>
    <button type="submit">I'm Feeling Lucky</button>
</div>

</form>
    </div>

    <div class="bottom-section">
        <div class="bottom-left">
<a href="https://ads.google.com">Advertising</a>
<a href="https://smallbusiness.withgoogle.com/#!/">Business</a>
<a href="https://www.google.com/search/howsearchworks/?fg=1">How Search Works</a>
</div>

<div class="bottom-middle">
    <a href="https://ai.google/societal-impact/?utm_source=googlehpfooter&utm_medium=housepromos&utm_campaign=bottom-footer">Applying AI towards science and the environment</a>
</div>

<div class="bottom-right">
<a href="https://policies.google.com/privacy?hl=en-GB&fg=1">Privacy</a>
<a href="https://policies.google.com/terms?hl=en-GB&fg=1">Terms</a>
<a href="https://www.google.com/settings">Settings</a>
    </div>
</div>
</div>
</body>
</html>
